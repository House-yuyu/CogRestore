
# CUDA_VISIBLE_DEVICES=7 torchrun --nproc_per_node=1 --master_port=1222 basicsr/train.py -opt options/train_allweather.yml
name: MD_RRSHID_step300k_bs6_ps128_lr2e4_d260203_2343  # 
model_type: ImageCleanModel_IterSup_Vec 
scale: 1                                                      
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: MD_RRSHID
    type: CsvDatasetV2
    root_path: /data2/users/zhangxu/ISP/1_AIR/PhyDAE/dataset/MD_RRSHID/train/
    csv_file_path: /data2/users/zhangxu/ISP/1_AIR/RS_recycle/csv/MD_RRSHID_train_all_degradations.csv
    require_text: true    ####
    io_backend:
      type: disk

    gt_size: 128  # 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 6 
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: MD_RRSHID_Test
    type: CsvDatasetV2
    root_path: /data2/users/zhangxu/ISP/1_AIR/PhyDAE/dataset/MD_RRSHID/test/
    csv_file_path: /data2/users/zhangxu/ISP/1_AIR/RS_recycle/csv/MD_RRSHID_test_N_caption.csv
    require_text: true    #
    io_backend:
      type: disk
    mod_crop_scale: 8     # padding 

    
# network structures
network_g:
  type: RS_AiOIR0203  # 取决了arch里的
  inp_channels: 3        
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 1   # 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  num_vector: 8
  iter_times: 2   ###############

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999                ##### 

  optim_g:
    type: AdamW
    lr: !!float 2e-4              
    weight_decay: !!float 1e-4    
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR   # 原始是800k
    periods: [300000]     
    restart_weights: [1]
    eta_min: 0.000001  

  total_iter: 300000    
  warmup_iter: -1 # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3 # for 3e3
  save_img: False
  rgb2bgr: true
  use_image: true

  metrics:
    psnr_y: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: true
    ssim_y:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: true


# logging settings
logger:
  print_freq: 1000  
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  # wandb:
  #   project: text
  #   resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500

find_unused_parameters: true